<script>
  // --- अपडेट पॉप-अप लॉजिक ---
  const LATEST_VERSION = "1.0"; 

  function checkAppUpdate() {
      const savedVersion = localStorage.getItem("userAppVersion");
      if (savedVersion !== LATEST_VERSION) {
          document.getElementById("updatePopup").style.display = "flex";
      }
  }

  function closeUpdatePopup() {
      localStorage.setItem("userAppVersion", LATEST_VERSION);
      document.getElementById("updatePopup").style.display = "none";
  }

  window.addEventListener('load', checkAppUpdate);

  // --- Service Worker ---
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Home: Registered!'))
        .catch(err => console.log('Home: Failed!', err));
    });
  }
</script>
<script>
let backPressedTime = 0;

window.onpopstate = function () {

    if (backPressedTime + 2000 > Date.now()) {

        // Android WebView असेल तर app बंद
        if (navigator.app) {
            navigator.app.exitApp();
        } else {
            window.close();
        }

    } else {
        alert("पुन्हा Back दाबा बाहेर जाण्यासाठी");
    }

    backPressedTime = Date.now();

    // history परत push करतो म्हणजे page मागे जाणार नाही
    history.pushState(null, null, location.href);
};

// सुरुवातीला history push करा
history.pushState(null, null, location.href);
</script>
