<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>शेती बातम्या</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { 
      --primary: #27ae60; 
      --primary-dark: #219653;
      --accent: #f39c12; 
      --bg: #f8f9fa; 
      --text: #2d3436;
      --card-bg: #ffffff;
    }
    
    body { font-family: 'Outfit', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
    
    header { 
      background: linear-gradient(135deg, #27ae60, #219653); 
      color: white; 
      padding: 18px; 
      text-align: center; 
      font-size: 22px; 
      font-weight: 700; 
      position: sticky; 
      top: 0; 
      z-index: 100;
      box-shadow: 0 4px 15px rgba(39, 174, 96, 0.2);
    }
    
    .tabs { display: flex; background: white; position: sticky; top: 64px; z-index: 90; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .tab { flex: 1; text-align: center; padding: 14px; cursor: pointer; font-weight: 600; color: #7f8c8d; border-bottom: 3px solid transparent; transition: 0.3s; font-size: 15px; }
    .active-tab { color: var(--primary); border-bottom-color: var(--primary); background: #f1f9f5; }

    .news-container { padding: 20px 15px; max-width: 550px; margin: auto; }
    
    .news-card { 
      background: var(--card-bg); 
      border-radius: 20px; 
      overflow: hidden; 
      margin-bottom: 22px; 
      box-shadow: 0 8px 25px rgba(0,0,0,0.06); 
      position: relative;
      border: 1px solid rgba(0,0,0,0.04);
    }
    
    .img-wrapper { position: relative; width: 100%; height: 210px; overflow: hidden; background: #e0e0e0; }
    .news-img { width: 100%; height: 100%; object-fit: cover; }

    .save-btn { 
      background: rgba(255, 255, 255, 0.95); 
      border: none; 
      font-size: 18px; 
      cursor: pointer; 
      position: absolute; 
      top: 12px; 
      right: 12px; 
      border-radius: 50%; 
      width: 40px; 
      height: 40px;
      display: flex; 
      align-items: center; 
      justify-content: center; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .news-content { padding: 18px; }
    .news-content h3 { margin: 0 0 12px; font-size: 17px; line-height: 1.45; color: #2c3e50; font-weight: 600; }
    
    .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f1f2f6; padding-top: 12px; margin-top: 5px; }
    .news-date { font-size: 13px; color: #95a5a6; }
    
    .read-more { 
      background: #27ae60; 
      color: white; 
      padding: 8px 16px; 
      border-radius: 8px; 
      border: none;
      font-weight: 600; 
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    #loader { text-align: center; padding: 60px; color: var(--primary); font-weight: bold; font-size: 16px; }
    
    .home-btn-container { max-width: 550px; margin: auto; padding: 0 15px 30px; text-align: center; }
    .home-btn {
      width: 100%; 
      padding: 15px; 
      border-radius: 14px; 
      border: none; 
      background: #0984e3 !important; 
      color: white; 
      font-size: 16px; 
      font-weight: 600; 
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(9, 132, 227, 0.3);
    }

    /* In-App News Modal */
    .news-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      justify-content: center;
      align-items: flex-end;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      width: 100%;
      max-width: 550px;
      max-height: 85vh;
      border-radius: 24px 24px 0 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: slideUp 0.25s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-header {
      padding: 15px 20px;
      background: #f8f9fa;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h4 { margin: 0; font-size: 16px; color: #333; }
    .close-btn {
      background: #ff7675;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
    }
    .modal-body {
      padding: 20px;
      overflow-y: auto;
    }
    .modal-body img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 15px;
    }
    .modal-body h2 {
      font-size: 18px;
      line-height: 1.5;
      color: #2c3e50;
      margin: 0 0 10px;
    }
    .source-btn {
      display: block;
      width: 100%;
      text-align: center;
      background: #27ae60;
      color: white;
      padding: 14px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 20px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

<header>🌾 शेती बातम्या व अपडेट्स</header>

<div class="tabs">
  <div id="latestTab" class="tab active-tab" onclick="showLatest()">📰 ताज्या बातम्या</div>
  <div id="savedTab" class="tab" onclick="showSaved()">🔖 सेव्ह केलेल्या</div>
</div>

<div class="news-container" id="newsBox">
  <div id="loader">🔄 बातम्या लोड होत आहेत, कृपया वाट पहा...</div>
</div>

<div class="home-btn-container">
  <button class="home-btn" onclick="location.href='home.html'">🔙 मुख्य पानावर जा</button>
</div>

<!-- In-App News Modal -->
<div id="newsModal" class="news-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h4>📰 शेती बातमी</h4>
      <button class="close-btn" onclick="closeNewsModal()">❌ बंद करा</button>
    </div>
    <div class="modal-body" id="modalBody">
      <!-- बातमीची सविस्तर माहिती इथे दिसेल -->
    </div>
  </div>
</div>

<script>
let allNews = [];
let savedNews = JSON.parse(localStorage.getItem('agri_saved_news')) || [];
const defaultImg = "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=600&auto=format&fit=crop";

async function fetchAgriNews() {
  try {
    const rssUrl = 'https://news.google.com/rss/search?q=Maharashtra+Agriculture+Marathi&hl=mr&gl=IN&ceid=IN:mr';
    const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
    const data = await response.json();
    
    allNews = data.items.map(item => {
      let img = defaultImg;
      if (item.enclosure && item.enclosure.link) {
        img = item.enclosure.link;
      } else if (item.description) {
        const div = document.createElement('div');
        div.innerHTML = item.description;
        const imgTag = div.querySelector('img');
        if (imgTag && imgTag.src) img = imgTag.src;
      }
      return { ...item, thumbnail: img };
    });
    
    showLatest();
  } catch (err) {
    document.getElementById('newsBox').innerHTML = "<p style='text-align:center; color:#e74c3c; font-weight:600;'>❌ बातम्या लोड होऊ शकल्या नाहीत.</p>";
  }
}

function renderNews(items) {
  const box = document.getElementById('newsBox');
  box.innerHTML = "";
  
  items.forEach((news, index) => {
    const isSaved = savedNews.some(s => s.link === news.link);
    const newsJson = JSON.stringify(news).replace(/"/g, '&quot;');
    
    box.innerHTML += `
      <div class="news-card">
        <div class="img-wrapper">
          <img src="${news.thumbnail}" class="news-img" onerror="this.onerror=null; this.src='${defaultImg}';">
          <button class="save-btn" onclick="toggleSave(${newsJson})">
            ${isSaved ? '❤️' : '🤍'}
          </button>
        </div>
        <div class="news-content">
          <h3>${news.title}</h3>
          <div class="card-footer">
            <span class="news-date">📅 ${new Date(news.pubDate).toLocaleDateString('mr-IN')}</span>
            <button class="read-more" onclick="openNewsModal(${index})">सविस्तर पहा →</button>
          </div>
        </div>
      </div>
    `;
  });
}

function openNewsModal(index) {
  const isSavedTab = document.getElementById('savedTab').classList.contains('active-tab');
  const news = isSavedTab ? savedNews[index] : allNews[index];
  
  const modalBody = document.getElementById('modalBody');
  modalBody.innerHTML = `
    <img src="${news.thumbnail}" onerror="this.onerror=null; this.src='${defaultImg}';">
    <h2>${news.title}</h2>
    <p style="color:#7f8c8d; font-size:13px; margin-bottom:15px;">📅 ${new Date(news.pubDate).toLocaleDateString('mr-IN')}</p>
    <a href="${news.link}" target="_blank" class="source-btn">🌐 मूळ वेबसाईटवर बातमी वाचा</a>
  `;
  
  document.getElementById('newsModal').style.display = 'flex';
}

function closeNewsModal() {
  document.getElementById('newsModal').style.display = 'none';
}

function toggleSave(news) {
  const index = savedNews.findIndex(s => s.link === news.link);
  if (index > -1) {
    savedNews.splice(index, 1);
  } else {
    savedNews.unshift(news);
  }
  localStorage.setItem('agri_saved_news', JSON.stringify(savedNews));
  
  if (document.getElementById('savedTab').classList.contains('active-tab')) {
    showSaved();
  } else {
    showLatest();
  }
}

function showLatest() {
  document.getElementById('latestTab').classList.add('active-tab');
  document.getElementById('savedTab').classList.remove('active-tab');
  renderNews(allNews);
}

function showSaved() {
  document.getElementById('savedTab').classList.add('active-tab');
  document.getElementById('latestTab').classList.remove('active-tab');
  if (savedNews.length === 0) {
    document.getElementById('newsBox').innerHTML = "<div style='text-align:center; padding:50px 20px; color:#7f8c8d;'><p style='font-size:40px; margin:0 0 10px;'>📂</p>तुम्ही अजून कोणतीही बातमी सेव्ह केलेली नाही.</div>";
  } else {
    renderNews(savedNews);
  }
}

fetchAgriNews();
</script>
</body>
</html>
