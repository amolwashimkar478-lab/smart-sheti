<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 स्मार्ट शेती - रोग ओळख</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #2e7d32;
    --primary-dark: #1b5e20;
    --bg: #e8f5e9;
    --card: #ffffff;
    --text: #2c3e50;
  }
  body { font-family: 'Outfit', sans-serif; background: var(--bg); padding:15px; margin:0; color: var(--text); }
  .container { max-width:440px; margin:auto; }
  .card { background: var(--card); padding:20px; border-radius:20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); text-align:center; }
  h2 { color: var(--primary); margin-top:0; font-size: 22px; }
  .btn-row { display:flex; gap:12px; margin:15px 0; }
  button { flex:1; padding:14px; border:none; border-radius:14px; font-size:16px; color:white; cursor:pointer; font-weight:bold; font-family:inherit; transition:0.2s; }
  button:active { transform: scale(0.96); }
  .camera { background: var(--primary); }
  .gallery { background: #1565c0; }
  .detect { background: #388e3c; width:100%; margin-top:12px; }
  .back { background: #0984e3; width:100%; margin-top:15px; }
  
  #previewContainer { margin: 15px 0; display: none; }
  #previewImage { width: 100%; max-height: 250px; object-fit: cover; border-radius: 14px; border: 2px solid var(--primary); }

  .result { margin-top:15px; background:#f1f8e9; padding:16px; border-radius:12px; text-align:left; line-height:1.6; min-height:60px; font-size:15px; border: 1px solid #c8e6c9; white-space: pre-wrap; word-wrap: break-word; }
  input[type=file] { display:none; }
  button:disabled { background: #ccc; cursor: not-allowed; }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>📸 पिकाचा फोटो टाका</h2>
    <input type="file" id="cameraInput" accept="image/*" capture="environment">
    <input type="file" id="galleryInput" accept="image/*">

    <div class="btn-row">
      <button class="camera" onclick="document.getElementById('cameraInput').click()">📷 कॅमेरा</button>
      <button class="gallery" onclick="document.getElementById('galleryInput').click()">🖼️ गॅलरी</button>
    </div>

    <div id="previewContainer">
      <img id="previewImage" src="" alt="निवडलेला फोटो">
    </div>

    <button class="detect" id="btnDetect" onclick="analyze()">🔍 रोग ओळखा</button>
    <div class="result" id="result">पिकाच्या बाधित पानाचा किंवा भागाचा फोटो निवडा आणि 'रोग ओळखा' वर क्लिक करा.</div>
  </div>
  <button class="back" onclick="location.href='home.html'">🔙 मुख्य पेजवर जा</button>
</div>

<script>
let cleanBase64Image = null;

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;

  document.getElementById("result").innerText = "⏳ फोटो प्रोसेस होत आहे...";
  
  const reader = new FileReader();
  reader.onload = function(event) {
    const img = new Image();
    img.src = event.target.result;
    
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      const maxWidth = 800;
      const scale = maxWidth / img.width;
      canvas.width = maxWidth;
      canvas.height = img.height * scale;
      
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      
      const fullDataUrl = canvas.toDataURL('image/jpeg', 0.8);
      
      // फोटो प्रीव्ह्यू दाखवा
      document.getElementById("previewImage").src = fullDataUrl;
      document.getElementById("previewContainer").style.display = "block";

      // Gemini API साठी फक्त शुद्ध Base64 (prefix काढून टाकणे)
      cleanBase64Image = fullDataUrl.split(",")[1];
      
      document.getElementById("result").innerText = "✅ फोटो निवडला गेला आहे. आता 'रोग ओळखा' बटणावर क्लिक करा.";
    };
  };
  reader.readAsDataURL(file);
}

document.getElementById("cameraInput").onchange = handleFile;
document.getElementById("galleryInput").onchange = handleFile;

async function analyze() {
  if(!cleanBase64Image) {
    alert("कृपया आधी कॅमेरा किंवा गॅलरीमधून फोटो निवडा.");
    return;
  }

  const resultDiv = document.getElementById("result");
  const btn = document.getElementById("btnDetect");
  
  resultDiv.innerText = "⏳ AI पिकाची तपासणी करत आहे, कृपया १०-१५ सेकंद थांबा...";
  btn.disabled = true;

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ 
        image: cleanBase64Image, 
        prompt: "तुमच्यासमोर पिकाचा फोटो दिला आहे. कृपया फोटो तपासून त्यातील पिकाचे नाव, आलेला रोग/कीड, त्याची लक्षणे आणि त्यावर वापरायची योग्य औषधे व प्रतिबंधात्मक उपाय सोप्या मराठी भाषेत सविस्तर सांगा."
      })
    });

    const data = await res.json();
    
    if(data.reply) {
      resultDiv.innerText = data.reply;
    } else {
      resultDiv.innerText = "क्षमस्व, फोटो स्पष्ट नसल्याने किंवा तांत्रिक कारणास्तव माहिती मिळू शकली नाही. कृपया दुसरा स्पष्ट फोटो टाका.";
    }

  } catch (e) {
    resultDiv.innerText = "तांत्रिक अडचण: " + e.message;
  } finally {
    btn.disabled = false;
  }
}
</script>

</body>
</html>
