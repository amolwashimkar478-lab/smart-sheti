<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>पीक व फवारणी सल्ला</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f8f9fa; margin: 0; padding: 15px; }
        .advice-card { background: white; border-radius: 20px; padding: 20px; max-width: 480px; margin: auto; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        .day-tag { background: #00b894; color: white; padding: 6px 18px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        
        /* सल्ल्याचे बॉक्सेस */
        .advice-content { background: #e8f5e9; border: 1px solid #c8e6c9; padding: 15px; border-radius: 15px; color: #2e7d32; font-size: 16px; line-height: 1.5; text-align: left; margin-bottom: 15px; }
        .weather-content { background: #e3f2fd; border: 1px solid #bbdefb; padding: 15px; border-radius: 15px; color: #1565c0; font-size: 16px; line-height: 1.5; text-align: left; }
        
        .box-title { font-weight: bold; font-size: 17px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        
        /* निळ्या रंगाचे बॅक बटण */
        .btn-blue { 
            margin-top: 20px; 
            background-color: #0984e3 !important; 
            color: white !important; 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            display: block;
        }
        .btn-blue:active { background-color: #0069d9 !important; }
    </style>
</head>
<body>

<div class="advice-card">
    <h2 id="cropTitle" style="color:#2d3436; margin-top: 5px;">🌾 पीक व फवारणी सल्ला</h2>
    <div class="day-tag" id="dayDisplay">लोकेशन/माहिती तपासत आहे...</div>
    
    <!-- १. पिकाचा टप्पा सल्ला -->
    <div class="advice-content" id="cropBox">
        <div class="box-title">📢 पिकाच्या वयानुसार सल्ला:</div>
        <span id="adviceText">पिकाची माहिती शोधत आहे...</span>
    </div>

    <!-- २. हवामानानुसार फवारणी सल्ला -->
    <div class="weather-content">
        <div class="box-title">🌦️ आजचा फवारणी सल्ला (हवामान):</div>
        <div id="weatherStatus" style="font-weight: bold; margin-bottom: 4px;">हवामान तपासत आहे...</div>
        <span id="weatherMsg">कृपया लोकेशनची वाट पहा...</span>
    </div>

    <!-- निळ्या रंगाचे बटन -->
    <button class="btn-blue" onclick="location.href='home.html'">🔙 मुख्य पानावर जा</button>
</div>

<script>
    // १. पीक सल्ला लॉजिक
    const rules = {
        "कापूस": { 30: "🌱 खताचा पहिला हप्ता द्या.", 50: "⚠️ बोंडअळीसाठी कामगंध सापळे लावा.", 90: "🌸 पाते गळ रोखण्यासाठी फवारणी करा." },
        "सोयाबीन": { 20: "🌿 कोळपणी किंवा खुरपणी करून तण नियंत्रण करा.", 45: "🌸 फुलधारणा अवस्था: पाणी द्या.", 75: "🐛 शेंगा पोखरणारी अळी तपासा." },
        "गहू": { 21: "💧 पहिले पाणी (CRIs) द्या.", 45: "🌾 नत्र खताचा दुसरा हप्ता द्या.", 80: "🌾 दाणे भरताना पाणी कमी पडू देऊ नका." },
        "हरभरा": { 30: "✂️ जास्त फुटवे फुटण्यासाठी शेंडा खुडा.", 60: "🐛 घाटे अळीसाठी फवारणी करा." },
        "कांदा": { 45: "🧅 खत द्या आणि खुरपणी करा.", 90: "🌿 मान पडू लागल्यावर पाणी बंद करा." },
        "हळद": { 90: "🚜 मोठी भरणी (माती चढवणे) करा.", 150: "⚠️ करपा रोगासाठी बुरशीनाशक वापरा." },
        "कलिंगड": { 30: "🍉 फळ फुगवणीसाठी खते द्या.", 65: "🍉 काढणीची तयारी करा." }
    };

    function loadAdvice() {
        const params = new URLSearchParams(window.location.search);
        const crop = params.get('crop');
        const date = params.get('date');

        if(crop && date) {
            document.getElementById('cropTitle').innerText = "🌾 " + crop;
            const diff = Math.floor((new Date() - new Date(date)) / 86400000);
            document.getElementById('dayDisplay').innerText = "लागवडीचा " + (diff < 0 ? 0 : diff) + " वा दिवस";

            let msg = "पिकाचे नियमित निरीक्षण करा आणि आवश्यकतेनुसार पाणी द्या.";
            if(rules[crop]) {
                let keys = Object.keys(rules[crop]).map(Number).sort((a,b)=>b-a);
                let best = keys.find(d => d <= diff);
                if(best) msg = rules[crop][best];
            }
            document.getElementById('adviceText').innerText = msg;
        } else {
            document.getElementById('cropBox').style.display = 'none';
            document.getElementById('dayDisplay').innerText = "आजची हवामान स्थिती";
        }
    }

    // २. हवामान आणि फवारणी सल्ला लॉजिक (Open-Meteo API)
    function fetchWeather() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(getPosition, showError);
        } else {
            document.getElementById("weatherStatus").innerText = "लोकेशन सपोर्ट करत नाही";
        }
    }

    function getPosition(position) {
        let lat = position.coords.latitude;
        let lon = position.coords.longitude;
        getWeatherAdvice(lat, lon);
    }

    function showError() {
        document.getElementById("weatherStatus").innerText = "⚠️ लोकेशन बंद आहे";
        document.getElementById("weatherMsg").innerText = "अचूक फवारणी सल्ल्यासाठी मोबाईलचे GPS / लोकेशन चालू करा.";
    }

    function getWeatherAdvice(lat, lon) {
        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,rain,wind_speed_10m`)
          .then(res => res.json())
          .then(data => {
            let temp = data.current.temperature_2m;
            let wind = data.current.wind_speed_10m;
            let humidity = data.current.relative_humidity_2m;
            let rain = data.current.rain > 0;
            
            let statusText = "";
            let adviceText = "";

            if (rain) {
              statusText = "🌧️ आज फवारणी करू नका!";
              adviceText = "तुमच्या भागात पाऊस सुरू आहे/शक्यता आहे. औषध धुऊन जाईल, फवारणी व खत देणे टाळा.";
            } else if (wind > 18) {
              statusText = "💨 फवारणी टाळा (वारा जास्त आहे)";
              adviceText = `सध्या वाऱ्याचा वेग ${Math.round(wind)} km/h आहे. वारा जास्त असल्याने फवारणी योग्य होणार नाही.`;
            } else if (humidity > 80) {
              statusText = "🦠 बुरशीजन्य रोगाचा धोका!";
              adviceText = "हवामानात दमटपणा जास्त आहे. पिकांवर करपा किंवा बुरशी येऊ शकते, योग्य बुरशीनाशक वापरा.";
            } else {
              statusText = "✅ फवारणीसाठी योग्य हवामान!";
              adviceText = `तापमान ${Math.round(temp)}°C आहे. सकाळी किंवा संध्याकाळी फवारणी व खत नियोजन करू शकता.`;
            }

            document.getElementById("weatherStatus").innerText = statusText;
            document.getElementById("weatherMsg").innerText = adviceText;
          })
          .catch(err => {
            document.getElementById("weatherStatus").innerText = "माहिती मिळण्यास अडचण";
            document.getElementById("weatherMsg").innerText = "इंटरनेट कनेक्शन तपासून पुन्हा प्रयत्न करा.";
          });
    }

    window.onload = function() {
        loadAdvice();
        fetchWeather();
    };
</script>
</body>
</html>
