<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>शेतकरी चर्चा मंच</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({ appId: "fdb7e40a-dc5c-4620-85d7-d99e5db6eb91" });
      });
    </script>
    
    <style>
        :root { 
            --primary: #27ae60; 
            --primary-dark: #219653;
            --bg: #f4f7f6; 
            --card: #ffffff; 
            --text: #2c3e50; 
            --border: #e2e8f0; 
            --ans-bg: #f8fafc; 
        }
        
        body.dark-theme { 
            --bg: #121212; 
            --card: #1e1e1e; 
            --text: #e4e6eb; 
            --border: #333; 
            --ans-bg: #2a2a2a; 
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding-bottom: 110px; 
            transition: 0.3s; 
        }

        .header { 
            background: linear-gradient(135deg, #27ae60, #219653); 
            color: white; 
            padding: 16px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.2);
        }

        .back-nav { font-size: 20px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .container { max-width: 600px; margin: auto; padding: 15px 12px; }

        .search-box { 
            width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); 
            margin-bottom: 15px; background: var(--card); color: var(--text); outline: none; font-family: inherit; box-sizing: border-box; box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .leaderboard { 
            background: #e8f8f0; padding: 12px 16px; border-radius: 12px; margin-bottom: 18px; font-size: 14px; 
            border: 1px dashed var(--primary); color: var(--primary-dark); display: flex; align-items: center; gap: 8px;
        }

        .card { 
            background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 16px; 
            box-shadow: 0 6px 18px rgba(0,0,0,0.04); border: 1px solid var(--border); transition: 0.2s; 
        }

        .expert-badge { background: #f1c40f; color: #000; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-left: 6px; }
        .action-icon { background: none; border: none; cursor: pointer; font-size: 15px; margin-left: 8px; opacity: 0.7; transition: 0.2s; }
        .action-icon:hover { opacity: 1; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-content { background: var(--card); padding: 22px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.25); }
        .modal-content textarea { width: 100%; height: 110px; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); resize: none; outline: none; margin-top: 12px; font-family: inherit; box-sizing: border-box; }
        .modal-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-modal { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-family: inherit; }

        .input-area { 
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); padding: 12px 15px; 
            display: flex; gap: 10px; border-top: 1px solid var(--border); box-shadow: 0 -4px 15px rgba(0,0,0,0.05); max-width: 600px; margin: auto;
        }

        .input-area input { 
            flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid var(--border); 
            background: var(--bg); color: var(--text); outline: none; font-family: inherit;
        }

        .circle-btn { 
            width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer; color: white; 
            display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; transition: 0.2s;
        }
        .circle-btn:active { transform: scale(0.92); }
    </style>
</head>
<body>

<div class="header">
    <div class="back-nav" onclick="location.href='home.html'">🔙 </div>
    <h2 style="margin:0; font-size:19px; font-weight: 700;">🗣️ शेतकरी चर्चा मंच</h2>
    <div onclick="toggleTheme()" style="cursor:pointer; font-size: 20px;">🌓</div>
</div>

<div class="container">
    <input type="text" class="search-box" id="searchBar" placeholder="🔍 प्रश्न शोधा..." onkeyup="filterQuestions()">
    <div class="leaderboard" id="topHelpers">🏆 <b>टॉप मदतगार:</b> लोड होत आहेत...</div>
    <div id="questionsContainer">🔄 प्रश्न लोड होत आहेत...</div>
</div>

<div id="customModal" class="modal">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 id="modalTitle" style="margin:0; color:var(--primary);">📝 माहिती</h3>
            <button class="circle-btn" style="background:#0984e3; width:36px; height:36px;" onclick="startVoice('modalInput')">🎤</button>
        </div>
        <textarea id="modalInput" placeholder="येथे लिहा..."></textarea>
        <div class="modal-btns">
            <button class="btn-modal" style="background:#e0e0e0; color:#333;" onclick="closeModal()">रद्द करा</button>
            <button class="btn-modal" style="background:var(--primary); color:white;" id="saveModalBtn">सेव्ह करा</button>
        </div>
    </div>
</div>

<div class="input-area">
    <button class="circle-btn" style="background:#0984e3" onclick="startVoice('qInput')">🎤</button>
    <input type="text" id="qInput" placeholder="तुमचा प्रश्न किंवा शंका विचारा...">
    <button class="circle-btn" style="background:var(--primary)" id="sendBtn">🚀</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1M7dJ9KFVe1GAGWPPqLuAT7BEuIKsZkM",
        authDomain: "smart-sheti-6512e.firebaseapp.com",
        projectId: "smart-sheti-6512e",
        storageBucket: "smart-sheti-6512e.firebasestorage.app",
        messagingSenderId: "1086459599128",
        appId: "1:1086459599128:web:03a34ed9ea2b95b1ebe66d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const qColl = collection(db, "community_questions");
    const currentUser = localStorage.getItem("userName") || localStorage.getItem("farmerName") || "शेतकरी मित्र";

    let modalAction = null;
    let targetId = null;
    let targetIndex = null;

    async function sendNotification(questionText, senderName) {
        const notificationData = {
            app_id: "fdb7e40a-dc5c-4620-85d7-d99e5db6eb91",
            included_segments: ["All"],
            headings: { "mr": "नवीन प्रश्न विचारला आहे! ❓", "en": "New Question Asked!" },
            contents: { "mr": `${senderName}: ${questionText}`, "en": `${senderName}: ${questionText}` },
            url: "https://smart-sheti.vercel.app/community.html"
        };

        try {
            await fetch("https://onesignal.com/api/v1/notifications", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json; charset=utf-8",
                    "Authorization": "Basic os_v2_app_7w36icw4lrdcbbox3gpf3nxlsfavafkhqjoebqvbcddyzigyjurjy6i654p6dhhpw2srdyozxalxjyow3sh2rkikggi2mdkz5274a3y"
                },
                body: JSON.stringify(notificationData)
            });
        } catch (error) { console.error("Notification Error:", error); }
    }

    onSnapshot(query(qColl, orderBy("timestamp", "desc")), (snapshot) => {
        const container = document.getElementById("questionsContainer");
        container.innerHTML = "";
        let likesMap = {};

        if (snapshot.empty) {
            container.innerHTML = "<p style='text-align:center; color:#888;'>अद्याप कोणताही प्रश्न विचारला गेलेला नाही. पहिला प्रश्न विचारा!</p>";
            return;
        }

        snapshot.forEach((docSnap) => {
            if (!docSnap.exists()) return;
            const q = docSnap.data();
            const id = docSnap.id;
            const isOwner = q.sender === currentUser;
            if(q.likes > 0) likesMap[q.sender] = (likesMap[q.sender] || 0) + q.likes;

            const card = document.createElement("div");
            card.className = "card question-card";
            card.id = "card-" + id;
            card.setAttribute("data-q", q.question.toLowerCase());
            
            let answersArr = q.answers || [];
            let ansHTML = answersArr.map((a, i) => `
                <div style="background:var(--ans-bg); padding:12px; border-radius:10px; margin-top:10px; font-size:14px; border-left:4px solid var(--primary); display:flex; justify-content:space-between; align-items:start;">
                    <span>💡 <b>उत्तर:</b> ${a}</span>
                    <div>
                        <button class="action-icon" onclick="window.reportAns('${id}', ${i})">⚠️</button>
                        ${isOwner ? `<button class="action-icon" onclick="window.openModal('editA', '${id}', '${a}', ${i})">✏️</button>` : ''}
                    </div>
                </div>`).join("");

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="font-size:14px; font-weight:bold; color:var(--primary);">
                        👤 ${q.sender} ${q.expert ? '<span class="expert-badge">⭐ Expert</span>' : ''}
                    </div>
                    ${isOwner ? `<div>
                        <button class="action-icon" onclick="window.openModal('editQ', '${id}', '${q.question}')">✏️</button>
                        <button class="action-icon" onclick="window.deleteQuestion('${id}')">🗑️</button>
                    </div>` : ''}
                </div>
                <div style="margin:12px 0; font-size:16px; font-weight:600; line-height:1.4;">❓ ${q.question}</div>
                <div>${ansHTML || '<span style="color:#888; font-size:13px;">💬 अद्याप उत्तरे नाहीत. पहिले उत्तर द्या!</span>'}</div>
                <div style="display:flex; gap:10px; margin-top:14px; border-top:1px solid var(--border); padding-top:12px;">
                    <button class="btn-modal" style="background:none; border:1px solid var(--border); font-size:13px; color:var(--text); border-radius:20px;" onclick="window.likeQ('${id}', ${q.likes || 0})">👍 उपयुक्त (${q.likes || 0})</button>
                    <button class="btn-modal" style="background:var(--primary); color:white; font-size:13px; border-radius:20px;" onclick="window.openModal('reply', '${id}')">✍️ उत्तर द्या</button>
                </div>`;
            container.appendChild(card);
        });
        updateLeaderboard(likesMap);
    }, (error) => {
        console.error("Firestore Error: ", error);
        document.getElementById("questionsContainer").innerHTML = `<p style='text-align:center; color:red;'>⚠️ डेटाबेस एरर: ${error.message}<br>कृपया Firebase Rules तपासा.</p>`;
    });

    window.deleteQuestion = async (id) => {
        if (confirm("हा प्रश्न कायमचा डिलीट करायचा का?")) {
            const element = document.getElementById("card-" + id);
            if (element) element.style.display = 'none';
            try { await deleteDoc(doc(db, "community_questions", id)); } 
            catch (e) { if (element) element.style.display = 'block'; alert("त्रुटी आली: " + e.message); }
        }
    };

    window.openModal = (action, id, text = "", index = null) => {
        modalAction = action; targetId = id; targetIndex = index;
        document.getElementById("modalInput").value = text;
        document.getElementById("modalTitle").innerText = action === 'reply' ? "📝 उत्तर द्या" : "✏️ सुधारा";
        document.getElementById("customModal").style.display = "flex";
    };
    window.closeModal = () => document.getElementById("customModal").style.display = "none";

    document.getElementById("saveModalBtn").onclick = async () => {
        const val = document.getElementById("modalInput").value.trim();
        if (!val) return;
        const docRef = doc(db, "community_questions", targetId);
        try {
            if (modalAction === 'reply') { await updateDoc(docRef, { answers: arrayUnion(val) }); } 
            else if (modalAction === 'editQ') { await updateDoc(docRef, { question: val }); } 
            else if (modalAction === 'editA') {
                const snap = await getDoc(docRef);
                let arr = snap.data().answers; arr[targetIndex] = val;
                await updateDoc(docRef, { answers: arr });
            }
            closeModal();
        } catch (err) {
            alert("सेव्ह करताना त्रुटी: " + err.message);
        }
    };

    window.reportAns = (id, i) => alert("तक्रार नोंदवली आहे.");
    window.likeQ = async (id, count) => {
        try {
            await updateDoc(doc(db, "community_questions", id), { likes: (count || 0) + 1 });
        } catch (err) {
            alert("लाइक करताना त्रुटी: " + err.message);
        }
    };

    document.getElementById("sendBtn").onclick = async () => {
        const input = document.getElementById("qInput");
        const qText = input.value.trim();
        if (!qText) {
            alert("कृपया काहीतरी लिहा!");
            return;
        }
        try {
            await addDoc(qColl, { 
                sender: currentUser, 
                question: qText, 
                timestamp: Date.now(), 
                likes: 0, 
                expert: localStorage.getItem("userRole") === 'expert', 
                answers: [] 
            });
            sendNotification(qText, currentUser);
            input.value = "";
        } catch (error) {
            console.error("Error adding document: ", error);
            alert("त्रुटी आली: " + error.message + "\n\nकृपया Firebase Firestore Rules तपासा.");
        }
    };

    function updateLeaderboard(map) {
        const sorted = Object.entries(map).sort((a,b) => b[1] - a[1]).slice(0, 3);
        document.getElementById("topHelpers").innerHTML = "🏆 <b>टॉप मदतगार:</b> " + (sorted.map(h => `${h[0]} (${h[1]}👍)`).join(", ") || "अद्याप कोणी नाही");
    }
</script>

<script>
    function filterQuestions() {
        const val = document.getElementById("searchBar").value.toLowerCase();
        document.querySelectorAll(".question-card").forEach(card => {
            card.style.display = card.getAttribute("data-q").includes(val) ? "block" : "none";
        });
    }

    function startVoice(inputId) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("तुमचा ब्राउझर व्हॉइस सर्च सपोर्ट करत नाही. कृपया गुगल क्रोम वापरा.");
            return;
        }
        
        try {
            const rec = new SpeechRecognition();
            rec.lang = 'mr-IN';
            rec.interimResults = false;
            
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript;
                document.getElementById(inputId).value = text;
            };
            
            rec.onerror = (e) => {
                alert("माईक त्रुटी: " + e.error);
            };
            
            rec.start();
        } catch (err) {
            alert("मायक्रोफोन सुरू होऊ शकला नाही.");
        }
    }

    if (localStorage.getItem("appTheme") === "dark") document.documentElement.classList.add("dark-theme");
    function toggleTheme() {
        document.body.classList.toggle("dark-theme");
        localStorage.setItem("appTheme", document.body.classList.contains("dark-theme") ? "dark" : "light");
    }
</script>
</body>
</html>
